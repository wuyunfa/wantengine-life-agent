name: Bug Report
description: Report a reproducible bug
labels: [bug]
body:
  - type: textarea
    id: desc
    attributes:
      label: Problem description
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: 1. ... 2. ... 3. ...
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: OS / Python / commit hash
